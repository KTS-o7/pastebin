<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paste - {{.ID}}</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --dim: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79b8ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .container {
    width: 100%;
    max-width: 860px;
    padding: 24px 16px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .paste-id {
    font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
    font-size: 16px;
    color: var(--text);
  }
  .paste-date {
    color: var(--dim);
    font-size: 13px;
  }
  .btn-group {
    display: flex;
    gap: 8px;
  }
  button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  button:hover { background: var(--border); }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  button.primary:hover { background: var(--accent-hover); }
  pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    overflow-x: auto;
    font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .footer-link {
    margin-top: 12px;
    font-size: 13px;
  }
  .footer-link a {
    color: var(--accent);
    text-decoration: none;
  }
  .footer-link a:hover { text-decoration: underline; }
  footer {
    margin-top: auto;
    padding: 16px;
    font-size: 12px;
    color: var(--dim);
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <span class="paste-id">{{.ID}}</span>
      <span class="paste-date">{{.Created}}</span>
    </div>
    <div class="btn-group">
      <button onclick="copyRaw()">Copy Raw</button>
      <button onclick="copyLink()">Copy Link</button>
      <button class="primary" onclick="window.location='/'">New Paste</button>
    </div>
  </div>

  <pre>{{.Content}}</pre>

  <div class="footer-link">
    raw: <a href="/raw/{{.ID}}">/raw/{{.ID}}</a>
  </div>
</div>

<footer>paste.shenthar.me</footer>

<script>
function copyLink() {
  navigator.clipboard.writeText(window.location.href);
}

function copyRaw() {
  navigator.clipboard.writeText(window.location.origin + '/raw/' + '{{.ID}}');
}
</script>
</body>
</html>
