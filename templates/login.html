<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>admin login — paste.shenthar.me</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --dim: #8b949e;
    --accent: #58a6ff;
    --red: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    width: 340px;
  }
  h1 { font-size: 18px; margin-bottom: 20px; }
  label { font-size: 13px; color: var(--dim); display: block; margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
  }
  button:hover { opacity: 0.9; }
  .error {
    color: var(--red);
    font-size: 13px;
    margin-bottom: 12px;
    text-align: center;
  }
  .back {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
  }
  .back a { color: var(--dim); text-decoration: none; }
  .back a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="box">
  <h1>admin login</h1>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="POST" action="/login">
    <label for="pass">password</label>
    <input type="password" id="pass" name="pass" required autofocus>
    <button type="submit">login</button>
  </form>
  <div class="back"><a href="/">&larr; back to pastebin</a></div>
</div>
</body>
</html>
